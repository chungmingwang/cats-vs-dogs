data:
  raw_dir: "/content/drive/MyDrive/cats-vs-dogs/data/train"
  work_dir: "/content/cats-vs-dogs-data/train"
  val_split: 0.1
  num_workers: 2
  image_size: 224

model:
  # "baseline_cnn"    : custom 3-block CNN (no pretrained weights)
  # "efficientnet_b0" : EfficientNet-B0 pretrained on ImageNet
  backbone: "baseline_cnn"
  pretrained: false
  num_classes: 2

training:
  epochs: 20
  batch_size: 32
  learning_rate: 0.001
  seed: 42
  resume: true

output:
  dir: "/content/drive/MyDrive/cats-vs-dogs/outputs"