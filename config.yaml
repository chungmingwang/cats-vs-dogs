data:
  raw_dir: "/content/drive/MyDrive/cats-vs-dogs/data"
  work_dir: "/content/cats-vs-dogs-data"
  val_split: 0.1
  num_workers: 2
  image_size: 224

model:
  backbone: "efficientnet_b0"
  pretrained: true
  num_classes: 2

training:
  epochs: 20
  batch_size: 32
  learning_rate: 1e-3
  seed: 42
  resume: false

output:
  dir: "/content/drive/MyDrive/cats-vs-dogs/outputs"